<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>ThreadsAI Lite</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="app">
      <h1>ThreadsAI Lite</h1>

      <label class="field">
        <span>Модель</span>
        <select id="gpt-model">
          <option value="gpt-4o-mini">gpt-4o-mini</option>
          <option value="gpt-4.1-mini">gpt-4.1-mini</option>
          <option value="gpt-5.2">gpt-5.2</option>
        </select>
      </label>

      <label class="field">
        <span>Лимит комментариев</span>
        <input id="max-comments" type="number" min="1" max="5000" />
      </label>

      <label class="field">
        <span>Задержка (сек), от</span>
        <input id="delay-min" type="number" min="1" max="600" />
      </label>

      <label class="field">
        <span>Задержка (сек), до</span>
        <input id="delay-max" type="number" min="1" max="600" />
      </label>

      <div class="buttons">
        <button id="save-settings">Сохранить</button>
        <button id="toggle-app">Запустить</button>
      </div>

      <p id="status">Готово</p>
    </main>

    <script src="popup.js" type="module"></script>
  </body>
</html>
