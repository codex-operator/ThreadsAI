<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ThreadsAI</title>
  <link rel="stylesheet" href="popup.css">
  <style>
    * { -webkit-user-select: none; user-select: none; }
    input, textarea { -webkit-user-select: text; user-select: text; }
  </style>
</head>
<body>

  <!-- ═══════════════════════ Основной экран ═══════════════════════ -->
  <div id="main-screen">

    <!-- Шапка -->
    <div class="header">
      <div class="header-left">
        <div class="app-logo">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7
                     8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8
                     8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5
                     a8.48 8.48 0 0 1 8 8v.5z"/>
          </svg>
        </div>
        <span class="app-name">ThreadsAI</span>
      </div>
      <div class="header-buttons">
        <button id="btn-inline-mode" class="btn-icon" title="Инлайн режим">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M12 20h9"/>
            <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/>
          </svg>
        </button>
        <button id="btn-settings" class="btn-icon" title="Настройки">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06
                     a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09
                     A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83
                     l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09
                     A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83
                     l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09
                     a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83
                     l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09
                     a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Счётчики -->
    <div class="stats-row" id="stats-row">
      <div class="stat-inline">
        <span class="stat-label">Комментариев</span>
        <span class="stat-value" id="comment-counter">0</span>
      </div>
      <div class="stat-inline">
        <span class="stat-label">Обработано</span>
        <span class="stat-value" id="processed-counter">0</span>
      </div>
    </div>

    <!-- Прогресс -->
    <div class="progress-container" id="progress-container">
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <span class="progress-text" id="progress-text">0 / 10</span>
    </div>

    <!-- Логи -->
    <div class="logs-section">
      <div class="section-header">
        <div class="log-tabs">
          <button class="log-tab active" data-tab="log">Лог</button>
          <button class="log-tab" data-tab="posts">Посты</button>
        </div>
        <div class="section-actions">
          <button id="btn-copy-log" class="btn-icon btn-small" title="Копировать">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <rect x="9" y="9" width="13" height="13" rx="2"/>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
          </button>
          <button id="btn-clear-log" class="btn-icon btn-small" title="Очистить">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <polyline points="3 6 5 6 21 6"/>
              <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
              <path d="M10 11v6"/>
              <path d="M14 11v6"/>
              <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="log-container" id="logs-container">
        <div id="activity-log" class="activity-log"></div>
        <div id="posts-log"    class="activity-log posts-view" style="display:none;"></div>
      </div>
    </div>

    <!-- Кнопка старт/стоп -->
    <div class="controls">
      <button id="action-button" class="btn btn-primary">Начать</button>
    </div>
  </div>

  <!-- ═══════════════════════ Модальное окно настроек ═══════════════════════ -->
  <div id="settings-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="modal-title">Настройки</h2>
        <button class="btn-icon btn-close" id="close-settings">✕</button>
      </div>

<!-- Провайдер -->
<div class="form-section">
  <div class="form-group">
    <label class="form-label">AI Провайдер</label>
    <select id="ai-provider" class="form-select">
      <option value="openai">OpenAI (ChatGPT)</option>
      <option value="gemini">Google Gemini</option>
    </select>
  </div>
</div>

<!-- OpenAI -->
<div class="form-section" id="openai-section">
  <div class="form-group">
    <label class="form-label">OpenAI API Key</label>
    <input type="password" id="openai-api-key" class="form-input"
           placeholder="sk-..." autocomplete="off">
    <p class="form-hint">
      Получить ключ:
      <a href="https://platform.openai.com/api-keys" target="_blank">platform.openai.com/api-keys</a>
    </p>
  </div>
</div>

<!-- Gemini -->
<div class="form-section" id="gemini-section" style="display:none;">
  <div class="form-group">
    <label class="form-label">Gemini API Key</label>
    <input type="password" id="gemini-api-key" class="form-input"
           placeholder="AIza..." autocomplete="off">
    <p class="form-hint">
      Получить ключ (бесплатно):
      <a href="https://aistudio.google.com/apikey" target="_blank">aistudio.google.com/apikey</a>
    </p>
  </div>
  <div class="form-group">
    <label class="form-label">Модель Gemini</label>
    <select id="gemini-model" class="form-select">
      <option value="gemini-2.0-flash">Gemini 2.0 Flash (быстрый, бесплатный)</option>
      <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
      <option value="gemini-1.5-flash">Gemini 1.5 Flash</option>
    </select>
  </div>
</div>

      <!-- Модель и стиль -->
      <div class="form-section">
        <div class="form-group">
          <label class="form-label">Модель</label>
          <select id="gpt-model" class="form-select">
            <option value="gpt-4o-mini">GPT-4o Mini (быстрый, дешёвый)</option>
            <option value="gpt-4o">GPT-4o</option>
            <option value="gpt-4-turbo">GPT-4 Turbo</option>
            <option value="gpt-3.5-turbo">GPT-3.5 Turbo (самый дешёвый)</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label">Стиль комментариев</label>
          <select id="comment-style" class="form-select">
            <option value="friendly">Дружелюбный</option>
            <option value="professional">Профессиональный</option>
            <option value="curious">Любопытный</option>
            <option value="witty">С юмором</option>
            <option value="custom">Свой промпт</option>
          </select>
        </div>

        <div class="form-group" id="custom-prompt-group" style="display:none;">
          <label class="form-label">Свой промпт</label>
          <textarea id="custom-prompt" class="form-textarea" rows="4"
                    placeholder="Напиши короткий комментарий к посту..."></textarea>
        </div>

        <div class="form-group">
          <label class="form-label">Лимит комментариев</label>
          <input type="number" id="max-comments" class="form-input"
                 value="10" min="1" max="5000">
        </div>

        <div class="form-group">
          <label class="form-label">Задержка между комментариями (сек)</label>
          <div class="form-range-row">
            <input type="number" id="delay-min" class="form-input" value="30" min="5"  max="3600">
            <span class="range-separator">—</span>
            <input type="number" id="delay-max" class="form-input" value="60" min="10" max="3600">
          </div>
        </div>

        <div class="form-group form-group-inline">
          <label class="form-label">Пропускать уже прокомментированные</label>
          <input type="checkbox" id="skip-replied" class="form-checkbox" checked>
        </div>
      </div>

      <button id="save-settings" class="btn btn-primary btn-full">Сохранить</button>
    </div>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
