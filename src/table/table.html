<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ThreadsAI - Таблица постов</title>
    <link rel="stylesheet" href="table.css">
</head>
<body>
    <!-- Analysis Loading Badge (top right) - Apple style -->
    <div id="analysis-badge" class="analysis-badge">
        <span class="analysis-badge-emoji">📊</span>
        <span class="analysis-badge-text">Анализируем...</span>
    </div>

    <!-- Analysis Panel (right side) - no header, close via overlay -->
    <div id="analysis-panel" class="analysis-panel">
        <button id="analysis-close-btn" class="analysis-close-btn" title="Закрыть">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        </button>
        <div class="analysis-panel-content" id="analysis-content">
            <!-- Analysis content will be inserted here -->
        </div>
    </div>
    <div id="analysis-overlay" class="analysis-overlay"></div>
    <div id="table-toast" class="table-toast" aria-live="polite"></div>

    <div class="container">
        <header class="header">
            <h1 class="title">Threads<span class="title-ai">AI</span></h1>
            <div class="controls">
                <div class="file-controls">
                    <select id="file-select" class="select">
                        <option value="">Выберите файл...</option>
                    </select>
                    <button id="btn-delete-file" class="btn-icon-sm btn-danger" title="Удалить выбранный файл">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                    </button>
                </div>
                <div id="drop-zone" class="drop-zone-mini">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
                    <span>JSON</span>
                    <input type="file" id="file-input" accept=".json" hidden>
                </div>
                <div class="file-controls export-controls">
                    <button id="btn-export-file" class="btn-icon-sm" title="Экспортировать выбранный JSON">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="m7 10 5 5 5-5"/><path d="M12 15V3"/></svg>
                    </button>
                    <button id="btn-show-export-folder" class="btn-icon-sm" title="Открыть папку последнего экспорта" disabled>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6a2 2 0 0 1 2-2h5l2 2h7a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6z"/><path d="M3 10h18"/></svg>
                    </button>
                </div>
                <span id="posts-count" class="count">0 постов</span>
            </div>
        </header>

        <!-- Filters -->
        <div class="filters">
            <div class="filter-group search-group">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                <input type="text" id="filter-search" class="search-input" placeholder="Поиск по тексту...">
            </div>
            <div class="filter-group">
                <label>Метрика:</label>
                <select id="filter-metric" class="select-sm">
                    <option value="">Все</option>
                    <option value="likes">Лайки</option>
                    <option value="comments">Комменты</option>
                    <option value="reposts">Репосты</option>
                    <option value="shares">Шеры</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Период:</label>
                <select id="filter-time" class="select-sm">
                    <option value="">Всё время</option>
                    <option value="1">1 час</option>
                    <option value="3">3 часа</option>
                    <option value="6">6 часов</option>
                    <option value="12">12 часов</option>
                    <option value="24">24 часа</option>
                    <option value="48">48 часов</option>
                    <option value="72">72 часа</option>
                </select>
            </div>
            <span id="filtered-count" class="count"></span>
        </div>

        <div class="table-wrapper">
            <table class="table" id="posts-table">
                <thead>
                    <tr>
                        <th class="sortable th-author" data-sort="author">Автор</th>
                        <th class="sortable th-text" data-sort="text">Текст</th>
                        <th class="sortable th-num th-icon-only" data-sort="likes" title="Лайки">
                            <svg class="th-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                        </th>
                        <th class="sortable th-num th-icon-only" data-sort="comments" title="Комментарии">
                            <svg class="th-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v10z"/></svg>
                        </th>
                        <th class="sortable th-num th-icon-only" data-sort="reposts" title="Репосты">
                            <svg class="th-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M17 1l4 4-4 4M3 11V9a4 4 0 0 1 4-4h14M7 23l-4-4 4-4M21 13v2a4 4 0 0 1-4 4H3"/></svg>
                        </th>
                        <th class="sortable th-num th-icon-only" data-sort="shares" title="Шеры">
                            <svg class="th-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2 11 13"/><path d="M22 2 15 22 11 13 2 9 22 2z"/></svg>
                        </th>
                        <th class="sortable th-num th-icon-only" data-sort="timeAgo" title="Время">
                            <svg class="th-icon" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2" stroke="var(--bg)" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
                        </th>
                        <th class="th-link"></th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <tr class="empty-row">
                        <td colspan="8">Выберите файл или перетащите JSON</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Floating Pagination -->
        <div id="pagination" class="pagination-float">
            <button id="btn-first" class="pg-btn" title="В начало">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 17l-5-5 5-5M18 17l-5-5 5-5"/></svg>
            </button>
            <button id="btn-prev" class="pg-btn" title="Назад">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
            </button>
            <span id="page-info" class="pg-info">1 / 1</span>
            <button id="btn-next" class="pg-btn" title="Вперёд">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
            </button>
            <button id="btn-last" class="pg-btn" title="В конец">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 17l5-5-5-5M6 17l5-5-5-5"/></svg>
            </button>
        </div>
    </div>

    <script type="module" src="table.js"></script>
</body>
</html>
